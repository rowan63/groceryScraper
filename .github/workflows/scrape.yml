name: Daily Grocery Scraper
on:
  schedule:
    - cron: "0 20 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python main.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FUZZY_THRESHOLD: "88"
